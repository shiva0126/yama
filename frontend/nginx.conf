server {
    listen 3000;
    root /usr/share/nginx/html;
    index index.html;

    # Use Docker's embedded DNS resolver so upstream hostnames are re-resolved
    # dynamically after container restarts instead of being cached at startup.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Proxy API requests to api-gateway
    location /api/ {
        set $upstream_api http://api-gateway:8080;
        proxy_pass $upstream_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy defense-plane requests to the dedicated defense API
    location /defense-api/ {
        set $upstream_defense http://defense-api:8098;
        proxy_pass $upstream_defense/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy evidence ledger requests
    location /evidence-api/ {
        set $upstream_evidence http://evidence-ledger:8096;
        proxy_pass $upstream_evidence/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy policy engine requests
    location /policy-api/ {
        set $upstream_policy http://policy-engine:8097;
        proxy_pass $upstream_policy/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy response orchestrator requests
    location /response-api/ {
        set $upstream_response http://response-orchestrator:8095;
        proxy_pass $upstream_response/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy WebSocket connections
    location /ws {
        set $upstream_ws http://api-gateway:8080;
        proxy_pass $upstream_ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # Serve static files; fallback to index.html for SPA routing
    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
        add_header Pragma "no-cache";
        add_header Expires "0";
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
