<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Dark circular backdrop -->
  <circle cx="32" cy="32" r="31" fill="#0d0117" stroke="#7c3aed" stroke-width="2"/>

  <!-- Trishul: center staff -->
  <line x1="32" y1="10" x2="32" y2="54" stroke="#a78bfa" stroke-width="3" stroke-linecap="round"/>

  <!-- Trishul: left prong (curved outward then inward) -->
  <path d="M32 26 C29 26 23 24 23 17 C23 11 27 10 32 10" stroke="#a78bfa" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Trishul: right prong (mirrored) -->
  <path d="M32 26 C35 26 41 24 41 17 C41 11 37 10 32 10" stroke="#a78bfa" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Trishul: horizontal crossbar -->
  <line x1="22" y1="32" x2="42" y2="32" stroke="#a78bfa" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Trishul: base fork (two feet) -->
  <path d="M27 54 L32 50 L37 54" stroke="#a78bfa" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Flame at top of center prong -->
  <path d="M32 5 C30 7 29.5 9 32 10 C34.5 9 34 7 32 5Z" fill="#f97316"/>

  <!-- Subtle glow dots on left/right prong tips -->
  <circle cx="23" cy="17" r="1.5" fill="#c4b5fd" opacity="0.8"/>
  <circle cx="41" cy="17" r="1.5" fill="#c4b5fd" opacity="0.8"/>
</svg>
