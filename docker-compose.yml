services:
  # ─────────────────────── Infrastructure ───────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ad_postgres
    environment:
      POSTGRES_USER: adassess
      POSTGRES_PASSWORD: adassess_secret
      POSTGRES_DB: adassessment
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./backend/shared/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U adassess"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: ad_redis
    command: redis-server --requirepass redis_secret --appendonly yes
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis_secret", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  nats:
    image: nats:2.10-alpine
    container_name: ad_nats
    command: ["-js"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats_data:/data

  minio:
    image: minio/minio:latest
    container_name: ad_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  # ─────────────────────── Backend Services ─────────────────────
  inventory-service:
    build:
      context: ./backend          # parent of all Go services
      dockerfile: inventory-service/Dockerfile
    container_name: ad_inventory
    ports:
      - "8082:8082"
    environment:
      PORT: 8082
      DB_DSN: postgres://adassess:adassess_secret@postgres:5432/adassessment?sslmode=disable
      REDIS_URL: redis://:redis_secret@redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  analysis-engine:
    build:
      context: ./backend
      dockerfile: analysis-engine/Dockerfile
    container_name: ad_analysis
    ports:
      - "8083:8083"
    environment:
      PORT: 8083
      DB_DSN: postgres://adassess:adassess_secret@postgres:5432/adassessment?sslmode=disable
      REDIS_URL: redis://:redis_secret@redis:6379/0
      INVENTORY_SERVICE_URL: http://inventory-service:8082
    depends_on:
      postgres:
        condition: service_healthy
      inventory-service:
        condition: service_started
    restart: unless-stopped

  report-service:
    build:
      context: ./backend
      dockerfile: report-service/Dockerfile
    container_name: ad_reports
    ports:
      - "8084:8084"
    environment:
      PORT: 8084
      DB_DSN: postgres://adassess:adassess_secret@postgres:5432/adassessment?sslmode=disable
      INVENTORY_SERVICE_URL: http://inventory-service:8082
      ANALYSIS_ENGINE_URL: http://analysis-engine:8083
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  scan-orchestrator:
    build:
      context: .
      dockerfile: backend/scan-orchestrator/Dockerfile
    container_name: ad_orchestrator
    ports:
      - "8081:8081"
    environment:
      PORT: 8081
      DB_DSN: postgres://adassess:adassess_secret@postgres:5432/adassessment?sslmode=disable
      REDIS_URL: redis://:redis_secret@redis:6379/0
      INVENTORY_SERVICE_URL: http://inventory-service:8082
      ANALYSIS_ENGINE_URL: http://analysis-engine:8083
      AGENT_BINARY_PATH: /app/yama-agent.exe
      YAMA_FIELD_ENC_KEY: a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0a1b2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      inventory-service:
        condition: service_started
    restart: unless-stopped

  api-gateway:
    build:
      context: ./backend
      dockerfile: api-gateway/Dockerfile
    container_name: ad_gateway
    ports:
      - "9080:8080"
    environment:
      PORT: 8080
      REDIS_URL: redis://:redis_secret@redis:6379/0
      SCAN_ORCHESTRATOR_URL: http://scan-orchestrator:8081
      INVENTORY_SERVICE_URL: http://inventory-service:8082
      ANALYSIS_ENGINE_URL: http://analysis-engine:8083
      REPORT_SERVICE_URL: http://report-service:8084
      JWT_SECRET: yama_jwt_secret_change_in_prod
      CORS_ALLOWED_ORIGIN: http://localhost
      ENV: development
    depends_on:
      redis:
        condition: service_healthy
      scan-orchestrator:
        condition: service_started
    restart: unless-stopped

  signal-collector:
    build:
      context: ./backend
      dockerfile: signal-collector/Dockerfile
    container_name: ad_signal_collector
    ports:
      - "8091:8091"
    environment:
      HTTP_PORT: 8091
      GRPC_PORT: 9091
      DB_DSN: postgres://adassess:adassess_secret@postgres:5432/adassessment?sslmode=disable
      REDIS_URL: redis://:redis_secret@redis:6379/0
      NATS_URL: nats://nats:4222
      MINIO_ENDPOINT: minio:9000
    depends_on:
      - nats
    restart: unless-stopped

  signal-normalizer:
    build:
      context: ./backend
      dockerfile: signal-normalizer/Dockerfile
    container_name: ad_signal_normalizer
    ports:
      - "8092:8092"
    environment:
      HTTP_PORT: 8092
      GRPC_PORT: 9092
      DB_DSN: postgres://adassess:adassess_secret@postgres:5432/adassessment?sslmode=disable
      REDIS_URL: redis://:redis_secret@redis:6379/0
      NATS_URL: nats://nats:4222
      MINIO_ENDPOINT: minio:9000
    depends_on:
      - nats
    restart: unless-stopped

  detector-engine:
    build:
      context: ./backend
      dockerfile: detector-engine/Dockerfile
    container_name: ad_detector_engine
    ports:
      - "8093:8093"
    environment:
      HTTP_PORT: 8093
      GRPC_PORT: 9093
      DB_DSN: postgres://adassess:adassess_secret@postgres:5432/adassessment?sslmode=disable
      REDIS_URL: redis://:redis_secret@redis:6379/0
      NATS_URL: nats://nats:4222
      MINIO_ENDPOINT: minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
    restart: unless-stopped

  correlation-engine:
    build:
      context: ./backend
      dockerfile: correlation-engine/Dockerfile
    container_name: ad_correlation_engine
    ports:
      - "8094:8094"
    environment:
      HTTP_PORT: 8094
      GRPC_PORT: 9094
      DB_DSN: postgres://adassess:adassess_secret@postgres:5432/adassessment?sslmode=disable
      REDIS_URL: redis://:redis_secret@redis:6379/0
      NATS_URL: nats://nats:4222
      MINIO_ENDPOINT: minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
    restart: unless-stopped

  response-orchestrator:
    build:
      context: ./backend
      dockerfile: response-orchestrator/Dockerfile
    container_name: ad_response_orchestrator
    ports:
      - "8095:8095"
    environment:
      HTTP_PORT: 8095
      GRPC_PORT: 9095
      DB_DSN: postgres://adassess:adassess_secret@postgres:5432/adassessment?sslmode=disable
      REDIS_URL: redis://:redis_secret@redis:6379/0
      NATS_URL: nats://nats:4222
      MINIO_ENDPOINT: minio:9000
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  evidence-ledger:
    build:
      context: ./backend
      dockerfile: evidence-ledger/Dockerfile
    container_name: ad_evidence_ledger
    ports:
      - "8096:8096"
    environment:
      HTTP_PORT: 8096
      GRPC_PORT: 9096
      DB_DSN: postgres://adassess:adassess_secret@postgres:5432/adassessment?sslmode=disable
      REDIS_URL: redis://:redis_secret@redis:6379/0
      NATS_URL: nats://nats:4222
      MINIO_ENDPOINT: minio:9000
      MINIO_BUCKET: yama-evidence
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    restart: unless-stopped

  policy-engine:
    build:
      context: ./backend
      dockerfile: policy-engine/Dockerfile
    container_name: ad_policy_engine
    ports:
      - "8097:8097"
    environment:
      HTTP_PORT: 8097
      GRPC_PORT: 9097
      DB_DSN: postgres://adassess:adassess_secret@postgres:5432/adassessment?sslmode=disable
      REDIS_URL: redis://:redis_secret@redis:6379/0
      NATS_URL: nats://nats:4222
      MINIO_ENDPOINT: minio:9000
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  defense-api:
    build:
      context: ./backend
      dockerfile: defense-api/Dockerfile
    container_name: ad_defense_api
    ports:
      - "8098:8098"
    environment:
      HTTP_PORT: 8098
      GRPC_PORT: 9098
      DB_DSN: postgres://adassess:adassess_secret@postgres:5432/adassessment?sslmode=disable
      REDIS_URL: redis://:redis_secret@redis:6379/0
      NATS_URL: nats://nats:4222
      MINIO_ENDPOINT: minio:9000
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ─────────────────────── Collector Agent ─────────────────────
  collector-agent:
    build:
      context: ./collector/agent
      dockerfile: Dockerfile
    container_name: ad_collector_agent
    ports:
      - "9090:9090"
    environment:
      AGENT_API_KEY: yama_agent_key_local
      AGENT_PORT: 9090
      DEFENSE_MODE: "true"
      SIGNAL_COLLECTOR_URL: http://signal-collector:8091
      DEFENSE_API_URL: http://defense-api:8098
      DEFENSE_URL: http://collector-agent:9090
      AGENT_ID: local-linux-agent
    volumes:
      - ./collector/powershell:/app/powershell
    depends_on:
      - signal-collector
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─────────────────────── Frontend ─────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ad_frontend
    ports:
      - "80:3000"
    depends_on:
      - api-gateway
    restart: unless-stopped

volumes:
  pg_data:
  redis_data:
  nats_data:
  minio_data:
